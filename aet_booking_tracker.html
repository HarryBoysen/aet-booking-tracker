<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AET Auth Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.container { background: #fff; border-radius: 16px; padding: 3rem; width: min(500px, 100%); box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center; }
h1 { font-size: 28px; margin-bottom: 1rem; }
p { font-size: 14px; color: #666; margin-bottom: 2rem; line-height: 1.6; }
.button { display: inline-block; padding: 12px 24px; font-size: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; margin: 0.5rem; }
.btn-login { background: #1a7a55; color: #fff; }
.btn-login:hover { background: #145e41; }
.btn-logout { background: #d32f2f; color: #fff; }
.btn-logout:hover { background: #b71c1c; }
.status { margin-top: 2rem; padding: 1rem; background: #f0f0ee; border-radius: 8px; border-left: 4px solid #1a7a55; }
.status.error { background: #fce8e8; border-left-color: #d32f2f; }
.status.success { background: #e8f5e9; border-left-color: #2d6e2d; }
.user-info { margin-top: 2rem; padding: 1.5rem; background: #e8f5e9; border-radius: 8px; }
.user-info h3 { color: #2d6e2d; margin-bottom: 1rem; }
.user-info p { color: #1a1a1a; text-align: left; margin: 0.5rem 0; }
</style>
</head>
<body>

<div class="container">
  <h1>🔐 AET Auth Test</h1>
  <p>Simple test to verify Firebase Authentication is working</p>
  
  <div id="loginSection">
    <button class="button btn-login" onclick="signInWithGoogle()">Sign in with Google</button>
  </div>

  <div id="userSection" style="display: none;">
    <div class="user-info">
      <h3>✅ Logged In Successfully!</h3>
      <p><strong>Name:</strong> <span id="userName"></span></p>
      <p><strong>Email:</strong> <span id="userEmail"></span></p>
      <p><strong>User ID:</strong> <span id="userId" style="font-size: 12px; color: #666;"></span></p>
    </div>
    <button class="button btn-logout" onclick="signOut()">Sign Out</button>
  </div>

  <div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut as firebaseSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIOaGt05ggJD9mcAa96OymC8_U55O6xQU",
  authDomain: "aet-booking-tracker.firebaseapp.com",
  projectId: "aet-booking-tracker",
  storageBucket: "aet-booking-tracker.firebasestorage.app",
  messagingSenderId: "750269064961",
  appId: "1:750269064961:web:814ef3573a9a01dfc2dd00"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signInWithGoogle = async function() {
  try {
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);
    showStatus("✅ Sign in successful!", "success");
  } catch (error) {
    showStatus("❌ Sign in failed: " + error.message, "error");
    console.error("Auth error:", error);
  }
}

window.signOut = async function() {
  try {
    await firebaseSignOut(auth);
    showStatus("✅ Signed out", "success");
  } catch (error) {
    showStatus("❌ Sign out failed: " + error.message, "error");
  }
}

window.showStatus = function(message, type) {
  const status = document.getElementById('status');
  status.textContent = message;
  status.className = 'status ' + type;
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('userSection').style.display = 'block';
    document.getElementById('userName').textContent = user.displayName || 'Unknown';
    document.getElementById('userEmail').textContent = user.email;
    document.getElementById('userId').textContent = user.uid;
    window.showStatus("✅ User authenticated successfully!", "success");
  } else {
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('userSection').style.display = 'none';
    document.getElementById('status').innerHTML = '';
  }
});
</script>

</body>
</html>
