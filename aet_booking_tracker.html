<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AET Booking Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;min-height:100vh}
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1a7a55 0%,#0f5a3d 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;border-radius:16px;padding:3rem;width:min(400px,90vw);box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center}
.login-box h1{font-size:28px;margin-bottom:8px}
.login-box p{font-size:14px;color:#666;margin-bottom:2rem}
.login-logo{font-size:56px;margin-bottom:1.5rem}
.login-input{width:100%;padding:12px 14px;font-size:15px;border:1px solid #ddd;border-radius:8px;margin-bottom:1rem;outline:none}
.login-input:focus{border-color:#1a7a55;box-shadow:0 0 0 3px rgba(26,122,85,0.1)}
.login-btn{width:100%;padding:12px 16px;background:#1a7a55;border:none;border-radius:8px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;transition:all 0.2s}
.login-btn:hover{background:#145e41}
.login-box .footer{margin-top:2rem;padding-top:1.5rem;border-top:0.5px solid #eee;font-size:12px;color:#999}
.error{color:#d32f2f;font-size:13px;margin-top:8px;display:none}
.page{max-width:1200px;margin:0 auto;padding:1.5rem}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
.stat{background:#fff;border-radius:10px;border:0.5px solid #e0e0dc;padding:14px 16px}
.stat-label{font-size:12px;color:#888;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:600}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
.toolbar input,.toolbar select{font-size:13px;padding:7px 11px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;height:36px;outline:none}
.toolbar input{flex:1;min-width:160px}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:7px 14px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;height:36px;white-space:nowrap}
.btn:hover{background:#f0f0ee}
.btn.primary{background:#1a7a55;border-color:#1a7a55;color:#fff}
.btn.primary:hover{background:#145e41}
.btn.sm{height:30px;font-size:12px;padding:5px 11px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.filter-btn{font-size:12px;padding:5px 13px;border:0.5px solid #ddd;border-radius:20px;background:#fff;color:#666;cursor:pointer}
.filter-btn:hover{background:#f0f0ee}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.top-tabs{display:flex;gap:4px;margin-bottom:1.25rem;border-bottom:0.5px solid #e0e0dc;padding-bottom:0}
.top-tab{font-size:13px;font-weight:500;color:#888;padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px}
.top-tab.active{color:#1a7a55;border-bottom-color:#1a7a55}
.tab-panel{display:none}
.tab-panel.active{display:block}
.bookings{display:flex;flex-direction:column;gap:12px}
.booking-card{background:#fff;border-radius:12px;border:0.5px solid #e0e0dc;overflow:hidden}
.booking-card.has-alert{border-left:3px solid #c0392b}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;gap:12px;flex-wrap:wrap}
.card-header:hover{background:#fafaf8}
.card-ref{font-weight:600;font-size:15px}
.card-guest{font-size:13px;color:#666}
.card-agent{font-size:12px;background:#f0f0ee;padding:2px 9px;border-radius:20px}
.empty{text-align:center;padding:3rem;color:#999;font-size:13px}
</style>
</head>
<body>

<!-- PASSWORD LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">🔐</div>
    <h1>AET Booking Tracker</h1>
    <p>Enter the access code to continue</p>
    <input type="password" id="passwordInput" class="login-input" placeholder="Enter access code..." autofocus>
    <button class="login-btn" onclick="checkPassword()">Sign In</button>
    <div class="error" id="errorMsg">Incorrect code. Try again.</div>
    <div class="footer">Only authorized team members</div>
  </div>
</div>

<!-- APP CONTENT (hidden until password correct) -->
<div id="appContent" style="display:none">

<div class="page">
  <div style="display:flex;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:10px">
    <div>
      <div style="font-size:20px;font-weight:600">AET Booking Tracker</div>
      <div style="font-size:13px;color:#666;margin-top:4px">Asia Evolution Tour — <button onclick="logout()" style="background:none;border:none;color:#d32f2f;cursor:pointer;font-weight:600">Sign Out</button></div>
    </div>
  </div>

  <div style="text-align:center;padding:3rem;color:#666">
    <p>✅ Access granted!</p>
    <p style="margin-top:1rem;font-size:13px;color:#1a7a55">Full tracker integration coming next session</p>
    <p style="margin-top:2rem;font-size:13px">Database protected with password security</p>
  </div>
</div>

</div><!-- END appContent -->

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
const SESSION_KEY = 'aet_session';
const CORRECT_PASSWORD = 'AET2024';

window.checkPassword = function() {
  const input = document.getElementById('passwordInput').value;
  const errorMsg = document.getElementById('errorMsg');
  
  if (input === CORRECT_PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, 'true');
    errorMsg.style.display = 'none';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';
    console.log('✅ Access granted');
  } else {
    errorMsg.style.display = 'block';
    document.getElementById('passwordInput').value = '';
    console.log('❌ Wrong password');
  }
}

window.logout = function() {
  if (confirm('Sign out?')) {
    sessionStorage.removeItem(SESSION_KEY);
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appContent').style.display = 'none';
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordInput').focus();
    console.log('✅ Logged out');
  }
}

// Check session on load
window.addEventListener('load', () => {
  if (sessionStorage.getItem(SESSION_KEY)) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';
    console.log('✅ Session restored');
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appContent').style.display = 'none';
    document.getElementById('passwordInput').focus();
  }
});

// Enter key
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') {
    checkPassword();
  }
});

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAIOaGt05ggJD9mcAa96OymC8_U55O6xQU",
  authDomain: "aet-booking-tracker.firebaseapp.com",
  projectId: "aet-booking-tracker",
  storageBucket: "aet-booking-tracker.firebasestorage.app",
  messagingSenderId: "750269064961",
  appId: "1:750269064961:web:814ef3573a9a01dfc2dd00"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
console.log('✅ Firebase ready');
</script>

</body>
</html>
