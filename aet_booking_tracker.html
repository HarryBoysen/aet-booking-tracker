<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AET Booking Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;min-height:100vh}
.login{position:fixed;inset:0;background:linear-gradient(135deg,#1a7a55,#0f5a3d);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;padding:3rem;width:min(400px,90vw);border-radius:16px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-box h1{font-size:28px;margin-bottom:20px}
.login-input{width:100%;padding:12px;font-size:15px;border:1px solid #ddd;border-radius:8px;margin-bottom:15px;outline:none}
.login-btn{width:100%;padding:12px;font-size:15px;background:#1a7a55;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600}
.login-btn:hover{background:#145e41}
.error{color:#d32f2f;font-size:13px;margin-top:10px;display:none}
.page{display:none;max-width:1200px;margin:0 auto;padding:1.5rem}
.page.active{display:block}
.top-tabs{display:flex;gap:4px;margin-bottom:1.25rem;border-bottom:0.5px solid #e0e0dc;padding-bottom:0}
.top-tab{font-size:13px;font-weight:500;color:#888;padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent}
.top-tab.active{color:#1a7a55;border-bottom-color:#1a7a55}
.tab-panel{display:none}
.tab-panel.active{display:block}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.toolbar input{flex:1;min-width:160px;padding:7px 11px;font-size:13px;border:0.5px solid #ccc;border-radius:8px}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:7px 14px;border:0.5px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;height:36px}
.btn:hover{background:#f0f0ee}
.btn.primary{background:#1a7a55;border-color:#1a7a55;color:#fff}
.btn.danger{background:#d32f2f;border-color:#d32f2f;color:#fff}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.filter-btn{font-size:12px;padding:5px 13px;border:0.5px solid #ddd;border-radius:20px;background:#fff;cursor:pointer}
.filter-btn.active{background:#1a1a1a;color:#fff}
.bookings{display:flex;flex-direction:column;gap:12px}
.booking-card{background:#fff;border-radius:12px;border:0.5px solid #e0e0dc;overflow:hidden;cursor:pointer}
.booking-card.has-alert{border-left:3px solid #c0392b}
.card-header{display:flex;justify-content:space-between;padding:12px 16px;align-items:center;flex-wrap:wrap}
.card-header:hover{background:#fafaf8}
.card-ref{font-weight:600;font-size:15px}
.card-guest{font-size:13px;color:#666;margin:0 10px}
.card-agent{font-size:12px;background:#f0f0ee;padding:2px 9px;border-radius:20px}
.card-body{border-top:0.5px solid #f0f0ec;padding:12px 16px}
.empty{text-align:center;padding:3rem;color:#999}
.header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:1.5rem}
.header-title{font-size:20px;font-weight:600}
.header-sub{font-size:13px;color:#666;margin-top:2px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-box">
    <div style="font-size:56px;margin-bottom:20px">🔐</div>
    <h1>AET Booking Tracker</h1>
    <p style="font-size:14px;color:#666;margin-bottom:30px">Enter access code</p>
    <input type="password" id="pwd" class="login-input" placeholder="Access code" autofocus>
    <button class="login-btn" onclick="tryLogin()">Sign In</button>
    <div class="error" id="err">Incorrect code</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="page">
  <div class="header">
    <div>
      <div class="header-title">AET Booking Tracker</div>
      <div class="header-sub">Asia Evolution Tour — <button onclick="logout()" style="background:none;border:none;color:#d32f2f;cursor:pointer;font-weight:600">Sign Out</button></div>
    </div>
  </div>

  <div class="top-tabs">
    <div class="top-tab active" onclick="switchTab('bookings')">📅 Bookings</div>
    <div class="top-tab" onclick="switchTab('stats')">📊 Stats</div>
    <div class="top-tab" onclick="switchTab('crm')">👥 Partners</div>
    <div class="top-tab" onclick="switchTab('sop')">📖 SOPs</div>
  </div>

  <div id="bookings-tab" class="tab-panel active">
    <div class="toolbar">
      <button class="btn primary" onclick="alert('New Booking feature coming soon')">+ New Booking</button>
      <button class="btn" onclick="alert('Export feature coming soon')">Export CSV</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn active">All</button>
      <button class="filter-btn">Follow-up</button>
      <button class="filter-btn">Deposits</button>
      <button class="filter-btn">Confirmed</button>
    </div>
    <div id="bookings-list"></div>
  </div>

  <div id="stats-tab" class="tab-panel">
    <p style="text-align:center;padding:2rem;color:#666">Stats will load from Firebase</p>
  </div>

  <div id="crm-tab" class="tab-panel">
    <p style="text-align:center;padding:2rem;color:#666">CRM/Partners will load from Firebase</p>
  </div>

  <div id="sop-tab" class="tab-panel">
    <p style="text-align:center;padding:2rem;color:#666">SOPs will load from Firebase</p>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
const PASSWORD = 'AET2024';

function tryLogin() {
  if (document.getElementById('pwd').value === PASSWORD) {
    sessionStorage.setItem('logged', '1');
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').classList.add('active');
    loadData();
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pwd').value = '';
  }
}

function logout() {
  if (confirm('Sign out?')) {
    sessionStorage.removeItem('logged');
    document.getElementById('login').style.display = 'flex';
    document.getElementById('app').classList.remove('active');
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.top-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab + '-tab').classList.add('active');
  event.target.classList.add('active');
}

document.getElementById('pwd').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') tryLogin();
});

if (sessionStorage.getItem('logged')) {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').classList.add('active');
}

// Firebase
const config = {
  apiKey: "AIzaSyAIOaGt05ggJD9mcAa96OymC8_U55O6xQU",
  authDomain: "aet-booking-tracker.firebaseapp.com",
  projectId: "aet-booking-tracker",
  storageBucket: "aet-booking-tracker.firebasestorage.app",
  messagingSenderId: "750269064961",
  appId: "1:750269064961:web:814ef3573a9a01dfc2dd00"
};

firebase.initializeApp(config);
const db = firebase.firestore();

function loadData() {
  db.collection('bookings').onSnapshot((snap) => {
    const html = snap.docs.map(d => {
      const b = d.data();
      return `<div class="booking-card">
        <div class="card-header">
          <div>
            <span class="card-ref">${b.ref}</span>
            <span class="card-guest">${b.guest}</span>
            <span class="card-agent">${b.agent}</span>
          </div>
        </div>
      </div>`;
    }).join('');
    document.getElementById('bookings-list').innerHTML = html || '<div class="empty">No bookings yet</div>';
  });
}
</script>

</body>
</html>
