<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AET Booking Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;min-height:100vh}
.page{max-width:1200px;margin:0 auto;padding:1.5rem}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
.stat{background:#fff;border-radius:10px;border:0.5px solid #e0e0dc;padding:14px 16px}
.stat-label{font-size:12px;color:#888;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:600}
.stat-val.red{color:#a32d2d}.stat-val.amber{color:#7a4a00}.stat-val.green{color:#2d6e2d}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
.toolbar input,.toolbar select{font-size:13px;padding:7px 11px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;height:36px;outline:none}
.toolbar input{flex:1;min-width:160px}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:7px 14px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;height:36px;white-space:nowrap}
.btn:hover{background:#f0f0ee}
.btn.primary{background:#1a7a55;border-color:#1a7a55;color:#fff}
.btn.primary:hover{background:#145e41}
.btn.danger{background:#fff;border-color:#e0a0a0;color:#a32d2d}
.btn.danger:hover{background:#fff0f0}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.filter-btn{font-size:12px;padding:5px 13px;border:0.5px solid #ddd;border-radius:20px;background:#fff;color:#666;cursor:pointer}
.filter-btn:hover{background:#f0f0ee}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

/* Booking cards */
.bookings{display:flex;flex-direction:column;gap:12px}
.booking-card{background:#fff;border-radius:12px;border:0.5px solid #e0e0dc;overflow:hidden}
.booking-card.has-alert{border-left:3px solid #c0392b}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;gap:12px;flex-wrap:wrap}
.card-header:hover{background:#fafaf8}
.card-title{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.card-ref{font-weight:600;font-size:15px}
.card-guest{font-size:13px;color:#666}
.card-agent{font-size:12px;background:#f0f0ee;padding:2px 9px;border-radius:20px}
.card-actions{display:flex;gap:6px;align-items:center}
.icon-btn{background:transparent;border:none;cursor:pointer;color:#999;font-size:16px;padding:4px 6px;border-radius:5px;display:inline-flex;align-items:center}
.icon-btn:hover{color:#1a1a1a;background:#f0f0ee}
.card-body{border-top:0.5px solid #f0f0ec;padding:0}
.hotels-table{width:100%;border-collapse:collapse;font-size:13px}
.hotels-table th{padding:8px 14px;text-align:left;font-weight:500;color:#888;font-size:11px;background:#fafaf8;border-bottom:0.5px solid #f0f0ec;white-space:nowrap}
.hotels-table td{padding:9px 14px;border-bottom:0.5px solid #f5f5f3;vertical-align:middle}
.hotels-table tr:last-child td{border-bottom:none}
.hotels-table tr:hover td{background:#fafaf8}
.hotel-alert td{background:#fff8f8}
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
.b-pending{background:#fef3e2;color:#7a4a00}
.b-alert{background:#fce8e8;color:#a32d2d}
.b-confirmed{background:#e8f5e9;color:#2d6e2d}
.b-cancelled{background:#f0f0ee;color:#666}
.dep-badge{font-size:11px;padding:2px 7px;border-radius:20px;white-space:nowrap}
.dep-required{background:#fef3e2;color:#7a4a00}
.dep-paid{background:#e8f5e9;color:#2d6e2d}
.dep-none{color:#ccc;font-size:11px}
.days-warn{color:#a32d2d;font-weight:600}
.days-ok{color:#aaa}
.empty{text-align:center;padding:3rem;color:#999;font-size:13px}
.chevron{transition:transform 0.2s;font-size:18px;color:#ccc}
.chevron.open{transform:rotate(180deg)}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;border:0.5px solid #ddd;padding:1.75rem;width:min(680px,96vw);margin:auto}
.modal h2{font-size:17px;font-weight:600;margin-bottom:1.25rem}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500}
.field input,.field select{width:100%;padding:8px 11px;font-size:13px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;outline:none}
.field input:focus,.field select:focus{border-color:#888}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid #eee}
.hotel-block{background:#f9f9f7;border:0.5px solid #e8e8e4;border-radius:10px;padding:14px;margin-bottom:10px;position:relative}
.hotel-block-title{font-size:12px;font-weight:600;color:#888;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.dep-section{margin-top:10px;padding-top:10px;border-top:0.5px solid #e8e8e4}
.dep-section-title{font-size:11px;font-weight:600;color:#aaa;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:6px}
.checkbox-row input[type=checkbox]{width:16px;height:16px;cursor:pointer}
.add-hotel-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:#1a7a55;background:none;border:0.5px dashed #1a7a55;border-radius:8px;padding:8px 14px;cursor:pointer;width:100%;justify-content:center;margin-top:4px}
.add-hotel-btn:hover{background:#f0faf5}
.section-divider{font-size:12px;font-weight:600;color:#aaa;margin:16px 0 10px;text-transform:uppercase;letter-spacing:0.05em}
</style>
</head>
<body>
<div class="page">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:1.25rem">
    <div>
      <div style="font-size:20px;font-weight:600">AET Booking Tracker</div>
      <div style="font-size:13px;color:#666;margin-top:2px">Asia Evolution Tour — booking@evolutiontour.com</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="exportCSV()"><i class="ti ti-download"></i> Export CSV</button>
      <button class="btn primary" onclick="openModal()"><i class="ti ti-plus"></i> New booking</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('alert',this)"><i class="ti ti-alert-circle"></i> Follow-up required</button>
    <button class="filter-btn" onclick="setFilter('deposit',this)"><i class="ti ti-credit-card"></i> Deposit pending</button>
    <button class="filter-btn" onclick="setFilter('confirmed',this)">Confirmed</button>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Search booking, hotel, guest, agent..." oninput="render()">
    <select id="agentFilter" onchange="render()"><option value="">All agents</option></select>
  </div>

  <div class="bookings" id="bookings"></div>
  <div id="empty" class="empty" style="display:none">
    <i class="ti ti-inbox" style="font-size:28px;display:block;margin-bottom:8px"></i>
    No bookings match your filter
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal" onclick="bgClose(event)">
<div class="modal">
  <h2 id="modal-title">New booking</h2>
  <div class="row3">
    <div class="field"><label>Booking ref.</label><input id="f-ref" placeholder="AET-2026-001"></div>
    <div class="field"><label>Your name (agent)</label><input id="f-agent" placeholder="Name"></div>
    <div class="field"><label>Guest / Group name</label><input id="f-guest" placeholder="Guest or group name"></div>
  </div>

  <div class="section-divider">Hotels</div>
  <div id="hotel-blocks"></div>
  <button class="add-hotel-btn" onclick="addHotelBlock()"><i class="ti ti-plus"></i> Add hotel</button>

  <div class="modal-footer">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="saveBooking()">Save booking</button>
  </div>
</div>
</div>

<script>
let bookings = JSON.parse(localStorage.getItem('aet_bookings_v2') || '[]');
let editId = null;
let currentFilter = 'all';
let expandedCards = new Set();

if (bookings.length === 0) {
  const d = (n) => { const x = new Date(); x.setDate(x.getDate() + n); return x.toISOString().split('T')[0]; };
  bookings = [
    {id:1, ref:'AET-001', agent:'Winnie', guest:'Hansen group (12 pax)', hotels:[
      {id:'h1', name:'Centara Koh Chang Resort', checkin:d(14), status:'pending', sent:d(-3), reply:'', deposit:{required:true, amount:'5000', informed:true, paid:false}},
      {id:'h2', name:'Seatran Ferry', checkin:d(13), status:'confirmed', sent:d(-5), reply:d(-4), deposit:{required:false, amount:'', informed:false, paid:false}},
    ]},
    {id:2, ref:'AET-002', agent:'Air', guest:'Albatros Travel DK', hotels:[
      {id:'h3', name:'Layana Resort Koh Lanta', checkin:d(21), status:'confirmed', sent:d(-5), reply:d(-4), deposit:{required:true, amount:'8000', informed:true, paid:true}},
      {id:'h4', name:'Anantara Chiang Mai', checkin:d(23), status:'pending', sent:d(-1), reply:'', deposit:{required:false, amount:'', informed:false, paid:false}},
    ]},
    {id:3, ref:'AET-003', agent:'Soren', guest:'Dan Explorer group', hotels:[
      {id:'h5', name:'Four Seasons Chiang Rai', checkin:d(30), status:'pending', sent:d(-4), reply:'', deposit:{required:true, amount:'12000', informed:false, paid:false}},
    ]},
  ];
  save();
}

function save() { localStorage.setItem('aet_bookings_v2', JSON.stringify(bookings)); }

function daysSince(dateStr) {
  if (!dateStr) return null;
  return Math.floor((new Date() - new Date(dateStr)) / 86400000);
}

function hotelNeedsFollowup(h) {
  return h.status === 'pending' && !h.reply && daysSince(h.sent) >= 2;
}

function bookingHasAlert(b) { return b.hotels.some(hotelNeedsFollowup); }
function bookingHasDepositPending(b) { return b.hotels.some(h => h.deposit && h.deposit.required && !h.deposit.paid); }

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function toggleCard(id) {
  if (expandedCards.has(id)) expandedCards.delete(id);
  else expandedCards.add(id);
  render();
}

function render() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const ag = document.getElementById('agentFilter').value;

  const agents = [...new Set(bookings.map(b => b.agent))].filter(Boolean).sort();
  const sel = document.getElementById('agentFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All agents</option>' + agents.map(a =>
    `<option value="${a}"${a === cur ? ' selected' : ''}>${a}</option>`).join('');

  let filtered = bookings.filter(b => {
    const hotelNames = b.hotels.map(h => h.name).join(' ');
    if (q && !`${b.ref} ${b.guest} ${b.agent} ${hotelNames}`.toLowerCase().includes(q)) return false;
    if (ag && b.agent !== ag) return false;
    if (currentFilter === 'alert') return bookingHasAlert(b);
    if (currentFilter === 'deposit') return bookingHasDepositPending(b);
    if (currentFilter === 'confirmed') return b.hotels.every(h => h.status === 'confirmed');
    return true;
  });

  filtered.sort((a, b) => {
    const af = bookingHasAlert(a), bf = bookingHasAlert(b);
    if (af && !bf) return -1; if (!af && bf) return 1; return 0;
  });

  const totalHotels = bookings.reduce((s, b) => s + b.hotels.length, 0);
  const alertCount = bookings.reduce((s, b) => s + b.hotels.filter(hotelNeedsFollowup).length, 0);
  const depPending = bookings.reduce((s, b) => s + b.hotels.filter(h => h.deposit && h.deposit.required && !h.deposit.paid).length, 0);
  const confirmed = bookings.reduce((s, b) => s + b.hotels.filter(h => h.status === 'confirmed').length, 0);

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Total bookings</div><div class="stat-val">${bookings.length}</div></div>
    <div class="stat"><div class="stat-label">Total hotels</div><div class="stat-val">${totalHotels}</div></div>
    <div class="stat"><div class="stat-label">Follow-up required</div><div class="stat-val red">${alertCount}</div></div>
    <div class="stat"><div class="stat-label">Deposit pending</div><div class="stat-val amber">${depPending}</div></div>
    <div class="stat"><div class="stat-label">Hotels confirmed</div><div class="stat-val green">${confirmed}</div></div>
  `;

  const container = document.getElementById('bookings');
  if (filtered.length === 0) {
    container.innerHTML = '';
    document.getElementById('empty').style.display = 'block';
    return;
  }
  document.getElementById('empty').style.display = 'none';

  container.innerHTML = filtered.map(b => {
    const hasAlert = bookingHasAlert(b);
    const isOpen = expandedCards.has(b.id);
    const hotelCount = b.hotels.length;
    const confirmedCount = b.hotels.filter(h => h.status === 'confirmed').length;

    const hotelsHtml = b.hotels.map(h => {
      const alert = hotelNeedsFollowup(h);
      const days = daysSince(h.sent);
      const daysCell = h.sent ? (alert ? `<span class="days-warn">${days}d ⚠</span>` : `<span class="days-ok">${days}d</span>`) : '—';
      const statusBadge = alert ? `<span class="badge b-alert">Follow up!</span>`
        : h.status === 'confirmed' ? `<span class="badge b-confirmed">Confirmed</span>`
        : h.status === 'cancelled' ? `<span class="badge b-cancelled">Cancelled</span>`
        : `<span class="badge b-pending">Awaiting</span>`;

      let depHtml = '';
      if (h.deposit && h.deposit.required) {
        const cur = h.deposit.currency || 'THB';
        if (h.deposit.paid) {
          depHtml = `<span class="dep-badge dep-paid">✓ Paid${h.deposit.amount ? ' '+h.deposit.amount+' '+cur : ''}</span>`;
        } else {
          const inf = h.deposit.informed ? '✓ Informed' : '! Not informed';
          depHtml = `<span class="dep-badge dep-required">Deposit req.${h.deposit.amount ? ' '+h.deposit.amount+' '+cur : ''} · ${inf}</span>`;
        }
      } else {
        depHtml = `<span class="dep-none">—</span>`;
      }

      return `<tr class="${alert ? 'hotel-alert' : ''}">
        <td><strong>${esc(h.name)}</strong></td>
        <td>${h.checkin || '—'}</td>
        <td>${statusBadge}</td>
        <td>${h.sent || '—'}</td>
        <td>${h.reply || '—'}</td>
        <td>${daysCell}</td>
        <td>${depHtml}</td>
        <td>
          <div style="display:flex;gap:4px">
            ${alert ? `<button class="icon-btn" title="Copy follow-up email" onclick="copyFollowup(${b.id},'${h.id}',event)" style="color:#c0392b"><i class="ti ti-mail"></i></button>` : ''}
            <button class="icon-btn" title="Mark replied / confirmed" onclick="markHotelReplied(${b.id},'${h.id}',event)" style="color:#2d6e2d"><i class="ti ti-check"></i></button>
          </div>
        </td>
      </tr>`;
    }).join('');

    return `<div class="booking-card${hasAlert ? ' has-alert' : ''}" id="card-${b.id}">
      <div class="card-header" onclick="toggleCard(${b.id})">
        <div class="card-title">
          <span class="card-ref">${esc(b.ref)}</span>
          <span class="card-guest">${esc(b.guest)}</span>
          <span class="card-agent">${esc(b.agent)}</span>
          <span style="font-size:12px;color:#aaa">${confirmedCount}/${hotelCount} hotels confirmed</span>
          ${hasAlert ? '<span class="badge b-alert">Follow up required</span>' : ''}
        </div>
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="icon-btn" title="Edit booking" onclick="editBooking(${b.id})"><i class="ti ti-edit"></i></button>
          <button class="icon-btn" title="Delete booking" onclick="deleteBooking(${b.id})" style="color:#ddd"><i class="ti ti-trash"></i></button>
          <i class="ti ti-chevron-down chevron ${isOpen ? 'open' : ''}"></i>
        </div>
      </div>
      ${isOpen ? `<div class="card-body">
        <table class="hotels-table">
          <thead><tr>
            <th>Hotel / Supplier</th>
            <th>Check-in</th>
            <th>Status</th>
            <th>Email sent</th>
            <th>Reply received</th>
            <th>Days waiting</th>
            <th>Deposit</th>
            <th></th>
          </tr></thead>
          <tbody>${hotelsHtml}</tbody>
        </table>
      </div>` : ''}
    </div>`;
  }).join('');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* Modal */
let hotelCount = 0;

function addHotelBlock(h) {
  hotelCount++;
  const idx = hotelCount;
  const hid = h ? h.id : 'new_' + Date.now() + '_' + idx;
  const div = document.createElement('div');
  div.className = 'hotel-block';
  div.dataset.hid = hid;
  div.innerHTML = `
    <div class="hotel-block-title">
      Hotel ${idx}
      <button type="button" onclick="removeHotelBlock(this)" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:18px" title="Remove hotel"><i class="ti ti-x"></i></button>
    </div>
    <div class="row2">
      <div class="field" style="grid-column:1/-1"><label>Hotel / Supplier name</label><input class="hf-name" placeholder="e.g. Centara Koh Chang Resort" value="${esc(h?h.name:'')}"></div>
    </div>
    <div class="row3">
      <div class="field"><label>Check-in date</label><input type="date" class="hf-checkin" value="${h?h.checkin:''}"></div>
      <div class="field"><label>Status</label>
        <select class="hf-status">
          <option value="pending"${(!h||h.status==='pending')?' selected':''}>Awaiting reply</option>
          <option value="confirmed"${h&&h.status==='confirmed'?' selected':''}>Confirmed</option>
          <option value="cancelled"${h&&h.status==='cancelled'?' selected':''}>Cancelled</option>
        </select>
      </div>
      <div class="field"><label>Email sent (date)</label><input type="date" class="hf-sent" value="${h?h.sent:new Date().toISOString().split('T')[0]}"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Reply received (date)</label><input type="date" class="hf-reply" value="${h?h.reply:''}"></div>
    </div>
    <div class="dep-section">
      <div class="dep-section-title">Deposit / Payment</div>
      <div class="checkbox-row">
        <input type="checkbox" class="hf-dep-req" id="depreq-${idx}" ${h&&h.deposit&&h.deposit.required?'checked':''} onchange="toggleDepFields(this,${idx})">
        <label for="depreq-${idx}" style="cursor:pointer">Deposit / immediate payment required</label>
      </div>
      <div class="dep-fields" id="dep-fields-${idx}" style="${h&&h.deposit&&h.deposit.required?'':'display:none'}">
        <div class="row3" style="margin-top:8px">
          <div class="field"><label>Amount</label><div style="display:flex;gap:6px"><select class="hf-dep-currency" style="width:80px;padding:8px 6px;font-size:13px;border:0.5px solid #ccc;border-radius:8px;background:#fff;outline:none"><option value="THB"${h&&h.deposit&&h.deposit.currency==='THB'?' selected':''}>THB</option><option value="USD"${h&&h.deposit&&h.deposit.currency==='USD'?' selected':(!h||!h.deposit||!h.deposit.currency?'':'')}>USD</option><option value="IDR"${h&&h.deposit&&h.deposit.currency==='IDR'?' selected':''}>IDR</option></select><input type="number" class="hf-dep-amount" placeholder="e.g. 5000" value="${h&&h.deposit?h.deposit.amount:''}" style="flex:1"></div></div>
          <div class="field" style="display:flex;align-items:flex-end;padding-bottom:2px">
            <div class="checkbox-row">
              <input type="checkbox" class="hf-dep-informed" id="depinf-${idx}" ${h&&h.deposit&&h.deposit.informed?'checked':''}>
              <label for="depinf-${idx}" style="cursor:pointer">Account informed</label>
            </div>
          </div>
          <div class="field" style="display:flex;align-items:flex-end;padding-bottom:2px">
            <div class="checkbox-row">
              <input type="checkbox" class="hf-dep-paid" id="deppaid-${idx}" ${h&&h.deposit&&h.deposit.paid?'checked':''}>
              <label for="deppaid-${idx}" style="cursor:pointer">Account paid</label>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('hotel-blocks').appendChild(div);
}

function toggleDepFields(cb, idx) {
  document.getElementById('dep-fields-' + idx).style.display = cb.checked ? '' : 'none';
}

function removeHotelBlock(btn) {
  btn.closest('.hotel-block').remove();
}

function openModal(b) {
  editId = b ? b.id : null;
  hotelCount = 0;
  document.getElementById('modal-title').textContent = b ? 'Edit booking' : 'New booking';
  document.getElementById('f-ref').value = b ? b.ref : '';
  document.getElementById('f-agent').value = b ? b.agent : '';
  document.getElementById('f-guest').value = b ? b.guest : '';
  document.getElementById('hotel-blocks').innerHTML = '';
  if (b && b.hotels.length > 0) {
    b.hotels.forEach(h => addHotelBlock(h));
  } else {
    addHotelBlock();
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
function bgClose(e) { if (e.target === document.getElementById('modal')) closeModal(); }

function saveBooking() {
  const ref = document.getElementById('f-ref').value.trim();
  const agent = document.getElementById('f-agent').value.trim();
  const guest = document.getElementById('f-guest').value.trim();
  if (!ref || !agent) { alert('Please fill in Booking ref. and Your name.'); return; }

  const hotels = [];
  document.querySelectorAll('.hotel-block').forEach((block, i) => {
    const name = block.querySelector('.hf-name').value.trim();
    if (!name) return;
    const depReq = block.querySelector('.hf-dep-req').checked;
    hotels.push({
      id: block.dataset.hid,
      name,
      checkin: block.querySelector('.hf-checkin').value,
      status: block.querySelector('.hf-status').value,
      sent: block.querySelector('.hf-sent').value,
      reply: block.querySelector('.hf-reply').value,
      deposit: {
        required: depReq,
        amount: depReq ? block.querySelector('.hf-dep-amount').value.trim() : '',
        currency: depReq ? (block.querySelector('.hf-dep-currency') ? block.querySelector('.hf-dep-currency').value : 'THB') : 'THB',
        informed: depReq ? block.querySelector('.hf-dep-informed').checked : false,
        paid: depReq ? block.querySelector('.hf-dep-paid').checked : false,
      }
    });
  });

  if (hotels.length === 0) { alert('Please add at least one hotel.'); return; }

  if (editId) {
    const i = bookings.findIndex(x => x.id === editId);
    if (i >= 0) bookings[i] = { ...bookings[i], ref, agent, guest, hotels };
  } else {
    bookings.push({ id: Date.now(), ref, agent, guest, hotels });
  }
  save(); closeModal(); render();
}

function editBooking(id) { const b = bookings.find(x => x.id === id); if (b) { expandedCards.add(id); openModal(b); } }

function deleteBooking(id) {
  if (confirm('Delete this booking and all its hotels?')) {
    bookings = bookings.filter(x => x.id !== id);
    expandedCards.delete(id);
    save(); render();
  }
}

function markHotelReplied(bookingId, hotelId, e) {
  e.stopPropagation();
  const b = bookings.find(x => x.id === bookingId);
  if (!b) return;
  const h = b.hotels.find(x => x.id === hotelId);
  if (!h) return;
  h.reply = new Date().toISOString().split('T')[0];
  h.status = 'confirmed';
  save(); render();
}

function copyFollowup(bookingId, hotelId, e) {
  e.stopPropagation();
  const b = bookings.find(x => x.id === bookingId);
  if (!b) return;
  const h = b.hotels.find(x => x.id === hotelId);
  if (!h) return;
  const text =
`Subject: Follow-up: ${b.ref} — ${h.name}

Dear Reservations Team,

This is a follow-up on our booking enquiry sent on ${h.sent}.

Could you please confirm availability and rates at your earliest convenience?

Thank you and best regards,
Team Asia Evolution`;

  navigator.clipboard.writeText(text).then(() => {
    showToast('✅ Follow-up email copied — paste into Gmail (Ctrl+V)');
  }).catch(() => {
    prompt('Copy this follow-up email:', text);
  });
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3500);
}

function exportCSV() {
  const rows = [['Ref','Agent','Guest','Hotel','Check-in','Status','Email sent','Reply','Days waiting','Deposit required','Amount THB','Account informed','Account paid']];
  bookings.forEach(b => {
    b.hotels.forEach(h => {
      const days = daysSince(h.sent);
      rows.push([b.ref, b.agent, b.guest, h.name, h.checkin, h.status, h.sent, h.reply, days||'', h.deposit.required?'Yes':'No', h.deposit.amount||'', h.deposit.informed?'Yes':'No', h.deposit.paid?'Yes':'No']);
    });
  });
  const csv = rows.map(r => r.map(c => `"${(c||'').toString().replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'AET_bookings_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
}

// Auto-expand cards with alerts
bookings.filter(bookingHasAlert).forEach(b => expandedCards.add(b.id));
render();
</script>
</body>
</html>
